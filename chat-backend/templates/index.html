<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin-bottom: 15px;
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #333;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const endpoint = "/chat";

// Generate persistent session ID
let sessionId = localStorage.getItem("chatSessionId");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("chatSessionId", sessionId);
}

function renderRecipe(recipe) {
  const ingredientsList = recipe.ingredients
    .map(item => `<li>${item}</li>`)
    .join("");

  const instructionsList = recipe.instructions
    .map((step, index) => `<li>${step}</li>`)
    .join("");

  const html = `
    <h3>${recipe.title}</h3>
    <h4>Ingredients</h4>
    <ul>${ingredientsList}</ul>
    <h4>Instructions</h4>
    <ol>${instructionsList}</ol>
  `;

  addMessage(html, "bot");
}

function addMessage(text, sender) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerHTML = text;   // ← changed here
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const response = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ 
        message: text,
        session_id: sessionId
      })
    });

    const data = await response.json();

    if (!data.title) {
      addMessage("Invalid response from server.", "bot");
      return;
    }

    const ingredientsList = data.ingredients
      .map(item => `<li>${item}</li>`)
      .join("");

    const instructionsList = data.instructions
      .map(step => `<li>${step}</li>`)
      .join("");

    addMessage(
    `<strong>${data.title}</strong>
    <h4>Ingredients</h4>
    <ul>${ingredientsList}</ul>
    <h4>Instructions</h4>
    <ol>${instructionsList}</ol>`,
    "bot"
    );
  } catch (err) {
    addMessage("Error connecting to server.", "bot");
  }
}

  const ingredientsList = recipe.ingredients
    .map(item => `<li>${item}</li>`)
    .join("");

  const instructionsList = recipe.instructions
    .map(step => `<li>${step}</li>`)
    .join("");

  const html = `
    <strong>${recipe.title}</strong>
    <h4>Ingredients</h4>
    <ul>${ingredientsList}</ul>
    <h4>Instructions</h4>
    <ol>${instructionsList}</ol>
  `;

  addMessage(html, "bot");
}

  const ingredientsList = ingredientsArray
    .map(item => `<li>${item}</li>`)
    .join("");

  const instructionsList = instructionsArray
    .map(step => `<li>${step}</li>`)
    .join("");

  const html = `
    <strong>${recipe.title}</strong>
    <h4>Ingredients</h4>
    <ul>${ingredientsList}</ul>
    <h4>Instructions</h4>
    <ol>${instructionsList}</ol>
  `;

  addMessage(html, "bot");
}

async function loadRecipes() {
  try {
    const response = await fetch("/recipes");
    const recipes = await response.json();

    recipes.forEach(recipe => {
      renderRecipe(recipe);
    });

  } catch (err) {
    console.error("Failed to load recipes", err);
  }
}

window.addEventListener("load", loadRecipes);

document.getElementById("messageInput")
  .addEventListener("keydown", function (e) {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
