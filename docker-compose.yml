services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - docker_postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - n8n_internal

  n8n:
    image: n8nio/n8n:stable
    ports:
      - "5678:5678"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      GENERIC_TIMEZONE: Africa/Johannesburg

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_PREFIX: n8n
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"
      
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_ON_ERROR: all

      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_HOST: oldskooln8n.xyz
      N8N_WEBHOOK_URL: https://oldskooln8n.xyz
      N8N_EDITOR_BASE_URL: https://oldskooln8n.xyz

      N8N_TRUST_PROXY: "true"
      
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678"]
      interval: 30s
      timeout: 5s
      retries: 3
      
    volumes:
      - n8n_data:/home/node/.n8n
      - "/mnt/c/Users/ianw/Downloads:/source"
      - "/mnt/d/downloads:/destination"

    networks:
      - n8n_internal
  python-fx:
    build: ./python-fx
    working_dir: /app
    volumes:
      - ./python-fx:/app
    ports:
      - "5000:5000"
    networks:
      - n8n_internal
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}

  n8n-worker:
    image: n8nio/n8n:stable
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    command: worker
    environment:
      NODE_ENV: production
      GENERIC_TIMEZONE: Africa/Johannesburg

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_PREFIX: n8n

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_internal
      
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run oldskooln8n
    volumes:
      - ./cloudflared:/etc/cloudflared
    networks:
      - n8n_internal

networks:
  n8n_internal:
    driver: bridge

volumes:
  n8n_data:
    external: true
    name: docker_n8n_data

  docker_postgres_data:
    external: true
  redis_data:

